{% extends 'base.html' %}

{% block title %}Admin Login{% endblock %}

{% block content %}
<div class="min-h-[80vh] flex items-center justify-center px-4 py-12">
    <div class="max-w-md w-full p-1 bg-[#16191D] rounded-[2rem] shadow-[0_20px_50px_rgba(0,0,0,0.6)] border border-white/5">
        <div class="bg-[#1C2025] p-8 md:p-10 rounded-[1.8rem] border border-white/[0.02]">
            <div class="mb-10 text-center">
                <div class="inline-flex items-center justify-center w-12 h-12 bg-amber-500 rounded-xl mb-4 shadow-lg shadow-amber-500/20">
                    <svg class="w-6 h-6 text-[#0F1115]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                    </svg>
                </div>
                <h2 class="text-2xl font-bold tracking-tight text-white">Admin Terminal</h2>
                <p class="mt-2 text-sm text-gray-500">Authorized Personnel Only</p>
            </div>

            <form method="POST" class="space-y-6">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                
                <div class="space-y-5">
                    <div class="flex flex-col">
                        <label class="text-[10px] font-bold text-gray-500 uppercase tracking-[0.2em] mb-2 ml-1">Admin ID</label>
                        <input type="text" name="username" required class="w-full px-4 py-4 bg-[#121418] border border-[#2A2F36] rounded-xl text-white focus:outline-none focus:border-amber-500/20 transition-all placeholder:text-gray-800" placeholder="Username">
                    </div>

                    <div class="flex flex-col">
                        <label class="text-[10px] font-bold text-gray-500 uppercase tracking-[0.2em] mb-2 ml-1">Passkey</label>
                        <input type="password" name="password" required class="w-full px-4 py-4 bg-[#121418] border border-[#2A2F36] rounded-xl text-white focus:outline-none focus:border-amber-500/20 transition-all placeholder:text-gray-800" placeholder="••••••••">
                    </div>
                </div>

                <div class="pt-2">
                    <button type="submit" class="w-full py-4 bg-amber-500 text-black hover:bg-amber-400 font-bold rounded-xl shadow-xl shadow-amber-500/10 transition-all active:scale-[0.98]">
                        Unlock Console
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
